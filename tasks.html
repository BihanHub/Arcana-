<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcana – Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <nav class="top-nav">
    <div class="logo">Arcana</div>
    <div class="nav-links">
      <a href="home.html" class="nav-link">Home</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="tasks.html" class="nav-link active">Tasks</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
      <a href="learning.html" class="nav-link">Learning</a>
      <a href="library.html" class="nav-link">Library</a>
    </div>
  </nav>
  <main class="main-content">
    <div class="drill-header"><h2>All tasks</h2><button class="back-btn" id="add-task-btn">+ New task</button></div>
    <div class="filters">
      <select id="filter-project"><option value="">All Projects</option><option value="p1">Website Redesign</option><option value="p2">Learn Rust</option><option value="p3">Fitness Routine</option></select>
      <select id="filter-priority"><option value="">All Priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
      <select id="filter-status"><option value="">All Statuses</option><option>Not Started</option><option>In Progress</option><option>Done</option></select>
      <button class="back-btn" id="clear-filters">Clear</button>
    </div>
    <div id="tasks-table"></div>
  </main>
</div>
<script>
  let tasks = JSON.parse(localStorage.getItem('arcana_tasks')) || [
    { id:'t1', projectId:'p1', title:'Create wireframes', dueDate:'2026-06-10', priority:'High', status:'In Progress', completed: false },
    { id:'t2', projectId:'p1', title:'Design homepage mockup', dueDate:'2026-06-15', priority:'High', status:'Not Started', completed: false },
    { id:'t3', projectId:'p1', title:'Write frontend code', dueDate:'2026-06-20', priority:'Medium', status:'Not Started', completed: false },
    { id:'t4', projectId:'p2', title:'Read Rust book chapters 1-5', dueDate:'2026-06-12', priority:'Medium', status:'In Progress', completed: false },
    { id:'t5', projectId:'p2', title:'Complete Rustlings exercises', dueDate:'2026-06-25', priority:'Low', status:'Not Started', completed: false },
    { id:'t6', projectId:'p3', title:'Morning yoga - 30 days', dueDate:'2026-06-30', priority:'Medium', status:'Not Started', completed: false }
  ];
  function saveTasks() { localStorage.setItem('arcana_tasks', JSON.stringify(tasks)); }

  function renderTaskTable(filtered) {
    const container = document.getElementById('tasks-table');
    if (!filtered.length) { container.innerHTML = '<p class="card">No tasks match.</p>'; return; }
    container.innerHTML = `<table>
      <thead><tr><th></th><th>Title</th><th>Project</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr></thead>
      <tbody>${filtered.map(t => {
        const projName = { p1:'Website Redesign', p2:'Learn Rust', p3:'Fitness Routine' }[t.projectId];
        return `<tr data-task-id="${t.id}">
          <td><input type="checkbox" class="task-checkbox-table" ${t.completed ? 'checked' : ''}></td>
          <td class="${t.completed ? 'done' : ''}">${t.title}</td>
          <td>${projName}</td><td>${t.dueDate || ''}</td>
          <td><span class="priority-${t.priority.toLowerCase()}">${t.priority}</span></td>
          <td>${t.status}</td>
          <td><button class="delete-task-table" style="background:none;border:none;cursor:pointer;color:var(--color-danger);">✖</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
    document.querySelectorAll('.task-checkbox-table').forEach(cb => {
      cb.addEventListener('change', (e) => {
        const row = e.target.closest('tr');
        const taskId = row.dataset.taskId;
        const task = tasks.find(t => t.id === taskId);
        if (task) { task.completed = e.target.checked; saveTasks(); applyFilters(); }
      });
    });
    document.querySelectorAll('.delete-task-table').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const row = e.target.closest('tr');
        const taskId = row.dataset.taskId;
        const idx = tasks.findIndex(t => t.id === taskId);
        if (idx !== -1) tasks.splice(idx, 1);
        saveTasks(); applyFilters();
      });
    });
  }
  function applyFilters() {
    let filtered = tasks;
    const p = document.getElementById('filter-project').value;
    const pri = document.getElementById('filter-priority').value;
    const st = document.getElementById('filter-status').value;
    if (p) filtered = filtered.filter(t => t.projectId === p);
    if (pri) filtered = filtered.filter(t => t.priority === pri);
    if (st) filtered = filtered.filter(t => t.status === st);
    renderTaskTable(filtered);
  }
  document.getElementById('add-task-btn').addEventListener('click', () => {
    const title = prompt('Task title:'); if (!title) return;
    const projectId = prompt('Project ID (p1, p2, p3):', 'p1');
    const dueDate = prompt('Due date (YYYY-MM-DD):', '');
    const priority = prompt('Priority (High/Medium/Low):', 'Medium');
    const status = prompt('Status (Not Started/In Progress/Done):', 'Not Started');
    tasks.push({ id:'t'+Date.now(), projectId, title, dueDate, priority, status, completed: false });
    saveTasks(); applyFilters();
  });
  document.getElementById('filter-project').addEventListener('change', applyFilters);
  document.getElementById('filter-priority').addEventListener('change', applyFilters);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('filter-project').value = '';
    document.getElementById('filter-priority').value = '';
    document.getElementById('filter-status').value = '';
    applyFilters();
  });
  applyFilters();
</script>
</body>
</html>
